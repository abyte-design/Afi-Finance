<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- White background -->
  <rect width="512" height="512" fill="#ffffff"/>
  <!-- A shape left leg -->
  <polygon points="80,420 160,100 220,100 145,420" fill="url(#grad1)"/>
  <!-- A shape right leg + chart bars integrated -->
  <polygon points="332,100 392,100 420,420 340,420" fill="url(#grad1)"/>
  <!-- A crossbar -->
  <rect x="165" y="255" width="182" height="48" rx="8" fill="url(#grad1)"/>
  <!-- Sparkle/star in the A triangle -->
  <path d="M256 185 L263 205 L283 205 L267 218 L274 238 L256 226 L238 238 L245 218 L229 205 L249 205 Z" fill="url(#grad1)" opacity="0.85"/>
  <!-- Swoosh line through the bottom -->
  <path d="M130,370 Q256,320 390,340" stroke="url(#grad1)" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Chart bar 1 (short) -->
  <rect x="300" y="360" width="30" height="60" rx="5" fill="url(#grad1)"/>
  <!-- Chart bar 2 (medium) -->
  <rect x="340" y="330" width="30" height="90" rx="5" fill="url(#grad1)"/>
  <!-- Chart bar 3 (tall) -->
  <rect x="380" y="295" width="30" height="125" rx="5" fill="url(#grad1)"/>
</svg>
